<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spectra Viewer</title>

  <link rel="stylesheet" href="https://cdn.spectraportal.dev/v0.1/css/spectra.min.css">
  <link rel="stylesheet" href="https://cdn.spectraportal.dev/v0.1/themes/theme.min.css">

  <style>
    :root{
      --sv-terminal-bg: #07120f;
      --sv-terminal-fg: #d9ffe9;
      --sv-terminal-accent: #7dffb3;
      --sv-terminal-border: rgba(125,255,179,.25);
      --sv-drawer-w: clamp(18rem, 33vw, 30rem);
    }

    html,
    body{
      height: 100%;
    }

    body{
      margin: 0;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      background: var(--sp-bg);
      color: var(--sp-text);
    }

    .sv-main{
      min-height: 0;
      overflow: hidden;
      padding: 0;
      width: 100%;
      max-width: none;
    }

    .sv-shell{
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
      gap: var(--sp-3);
      height: 100%;
      min-height: 0;
      align-items: stretch;
      padding: var(--sp-2);
      box-sizing: border-box;
    }

    .sv-panel{
      min-width: 0;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .sv-browserHeader,
    .sv-previewHeader{
      display: flex;
      justify-content: space-between;
      gap: var(--sp-3);
      align-items: start;
      flex-wrap: wrap;
    }

    .sv-browserTitle{
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      align-items: center;
    }

    .sv-browserTitlePath{
      color: var(--sp-link);
      text-decoration: underline;
      text-underline-offset: var(--sp-underline-offset);
      word-break: break-all;
      font-size: var(--sp-fs-2);
    }

    .sv-previewHeading{
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      align-items: center;
    }

    .sv-previewModes{
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      align-items: end;
    }

    .sv-drawerSection{
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .sv-drawerSectionTitle{
      font-size: var(--sp-fs-1);
      color: var(--sp-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .sv-drawerActionsStack{
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .sv-searchRow{
      display: flex;
      gap: var(--sp-3);
      align-items: stretch;
    }

    .sv-searchRow .sp-field{
      flex: 1 1 auto;
      min-width: 0;
    }

    .sv-searchRow .sp-input{
      min-width: 0;
    }

    .sv-searchRow .sp-btn{
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .sv-fileList{
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sv-fileList li + li{
      margin-top: var(--sp-2);
    }

    .sv-fileItem{
      display: flex;
      gap: var(--sp-2);
      align-items: stretch;
    }

    .sv-fileBtn{
      width: 100%;
      text-align: left;
      appearance: none;
      background: transparent;
      color: inherit;
      border: var(--sp-border-1);
      border-radius: var(--sp-radius-2);
      padding: var(--sp-3);
      cursor: pointer;
      transition: background var(--sp-duration-2) var(--sp-ease-standard), border-color var(--sp-duration-2) var(--sp-ease-standard);
    }

    .sv-fileItem .sv-fileBtn{
      flex: 1 1 auto;
    }

    .sv-fileBtn:hover{
      background: var(--sp-elev);
      border-color: var(--sp-border-strong);
    }

    .sv-fileBtn[aria-current="true"]{
      background: color-mix(in oklab, var(--sp-accent) 14%, var(--sp-elev));
      border-color: color-mix(in oklab, var(--sp-accent) 45%, var(--sp-border));
    }

    .sv-fileAction{
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.25rem;
      padding: 0 var(--sp-2);
      border: var(--sp-border-1);
      border-radius: var(--sp-radius-2);
      color: var(--sp-link);
      text-decoration: none;
      background: transparent;
      transition: background var(--sp-duration-2) var(--sp-ease-standard), border-color var(--sp-duration-2) var(--sp-ease-standard), color var(--sp-duration-2) var(--sp-ease-standard);
    }

    .sv-fileAction:hover{
      background: var(--sp-elev);
      border-color: var(--sp-border-strong);
      color: var(--sp-text);
      text-decoration: underline;
      text-decoration-color: var(--sp-underline);
    }

    .sv-fileRow{
      display: flex;
      justify-content: space-between;
      gap: var(--sp-3);
      align-items: center;
    }

    .sv-fileName{
      display: flex;
      flex-wrap: nowrap;
      gap: .2rem;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .sv-fileTitle{
      display: inline-block;
      white-space: nowrap;
    }

    .sv-fileKind{
      font-size: .9em;
      color: var(--sp-muted);
      white-space: nowrap;
      flex: 0 0 auto;
      opacity: .82;
    }

    .sv-fileMeta{
      font-size: var(--sp-fs-1);
      color: var(--sp-muted);
      white-space: nowrap;
    }

    .sv-scroll{
      overflow: auto;
      min-height: 0;
      flex: 1 1 auto;
    }

    .sv-preview{
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--sp-font-mono);
      font-size: var(--sp-fs-1);
      line-height: var(--sp-lh-3);
      padding: var(--sp-3);
      border: var(--sp-border-1);
      border-radius: var(--sp-radius-2);
      background: var(--sp-surface-2);
      min-height: 12rem;
    }

    .sv-preview--terminal{
      background:
        radial-gradient(circle at top right, rgba(125,255,179,.08), transparent 32%),
        var(--sv-terminal-bg);
      color: var(--sv-terminal-fg);
      border-color: var(--sv-terminal-border);
      box-shadow: inset 0 0 0 1px rgba(125,255,179,.04);
    }

    .sv-terminal{
      min-height: 20rem;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .sv-terminal__bar{
      display: flex;
      justify-content: space-between;
      gap: var(--sp-3);
      align-items: center;
      font-size: var(--sp-fs-1);
      color: color-mix(in srgb, var(--sv-terminal-fg), transparent 24%);
    }

    .sv-terminal__dots{
      display: inline-flex;
      gap: .45rem;
      align-items: center;
    }

    .sv-terminal__dot{
      width: .7rem;
      height: .7rem;
      border-radius: 999px;
      background: color-mix(in srgb, var(--sv-terminal-accent), black 35%);
      opacity: .9;
    }

    .sv-terminal__body{
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--sp-font-mono);
      font-size: var(--sp-fs-1);
      line-height: 1.65;
      color: var(--sv-terminal-fg);
    }

    .sv-terminal__prompt{
      color: var(--sv-terminal-accent);
    }

    .sv-imagePreview{
      max-width: 100%;
      border-radius: var(--sp-radius-2);
      border: var(--sp-border-1);
      display: block;
    }

    .sv-metaLink{
      color: var(--sp-link);
      text-decoration: underline;
      text-underline-offset: var(--sp-underline-offset);
      word-break: break-all;
    }

    .sv-drawer{
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sv-drawer-w);
      max-width: calc(100vw - 2rem);
      transform: translateX(-104%);
      transition: transform var(--sp-duration-3) var(--sp-ease-standard);
      z-index: 60;
      display: flex;
      flex-direction: column;
      background: var(--sp-surface);
      border-right: var(--sp-border-1);
      box-shadow: var(--sp-shadow-4);
    }

    .sv-drawer.is-open{
      transform: translateX(0);
    }

    .sv-drawerBackdrop{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.44);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--sp-duration-3) var(--sp-ease-standard);
      z-index: 50;
    }

    .sv-drawerBackdrop.is-open{
      opacity: 1;
      pointer-events: auto;
    }

    .sv-drawerHeader{
      display: flex;
      justify-content: space-between;
      gap: var(--sp-3);
      align-items: center;
      padding: var(--sp-4);
      border-bottom: var(--sp-border-1);
    }

    .sv-drawerBody{
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      overflow: auto;
      min-height: 0;
    }

    .sv-drawerActions{
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      align-items: end;
    }

    .sv-footerWrap{
      margin-top: var(--sp-3);
      padding: 0 var(--sp-2) var(--sp-2);
    }

    .demo-footer__row{
      display: flex;
      justify-content: space-between;
      gap: var(--sp-4);
      align-items: center;
      flex-wrap: wrap;
      color: var(--sp-text-muted);
      font-size: var(--sp-fs-1);
    }

    .demo-footer__credit{
      color: var(--sp-text-muted);
    }

    .demo-footer__links{
      display: flex;
      gap: var(--sp-4);
      flex-wrap: wrap;
      align-items: center;
    }

    .demo-footer__link{
      color: var(--sp-text-muted);
      text-decoration: none;
    }

    .demo-footer__link:hover{
      color: var(--sp-text);
      text-decoration: underline;
      text-decoration-color: var(--sp-underline);
    }

    @media (max-width: 820px){
      body{
        overflow: auto;
      }

      .sv-main{
        overflow: visible;
      }

      .sv-shell{
        grid-template-columns: 1fr;
        height: auto;
        padding: var(--sp-2);
      }

      .sv-panel{
        height: auto;
      }

      .sv-drawer{
        width: min(90vw, 26rem);
      }

      .sv-searchRow{
        flex-direction: column;
        align-items: stretch;
      }

      .demo-footer__row{
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="sv-drawerBackdrop" id="drawerBackdrop"></div>
  <aside class="sv-drawer" id="toolDrawer" aria-hidden="true">
    <div class="sv-drawerHeader">
      <div class="sp-stack">
        <strong>Browse tools</strong>
      </div>
      <button class="sp-btn sp-btn--sm" id="drawerCloseBtn" type="button">Close</button>
    </div>
    <div class="sv-drawerBody">
      <div class="sv-drawerSection">
        <div class="sv-drawerSectionTitle">Search</div>
        <div class="sv-searchRow">
          <div class="sp-field">
            <input class="sp-input" id="searchInput" aria-label="Search files" placeholder="Search files" />
          </div>
          <button class="sp-btn sp-btn--primary sp-btn--sm" id="searchBtn" type="button">Search</button>
        </div>
      </div>

      <div class="sv-drawerSection">
        <div class="sv-drawerSectionTitle">Actions</div>
        <div class="sv-drawerActionsStack">
          <button class="sp-btn" id="refreshBtn" type="button">Refresh</button>
          <button class="sp-btn" id="uploadBtn" type="button">Upload to drafts</button>
        </div>
      </div>
    </div>
  </aside>

  <header class="sp-header">
    <div class="sp-header__inner sp-container">
      <div class="sp-header__left">
        <a class="sp-brand" href="#">
          <span class="sp-brand__text">Spectra Viewer</span>
          <span class="sp-badge sp-badge--soft">private</span>
          <span class="sp-badge sp-badge--soft">v0.0</span>
        </a>
      </div>
      <nav class="sp-header__center sp-nav" aria-label="Primary">
        <a class="sp-nav__link" href="#browser">Browse</a>
        <a class="sp-nav__link" href="#preview">Preview</a>
      </nav>
      <div class="sp-header__right">
        <button class="sp-btn sp-btn--secondary" id="navDrawerToggleBtn" type="button" aria-expanded="false" aria-controls="toolDrawer">Tools</button>
      </div>
    </div>
  </header>

  <main class="sp-container sv-main">
    <section class="sv-shell">
      <article id="browser" class="sp-card sv-panel">
        <div class="sp-card__header">
          <div class="sv-browserHeader">
            <div class="sv-browserTitle">
              <h2 class="sp-h3">Browse:</h2>
              <span class="sv-browserTitlePath" id="browseTitlePath">drafts/</span>
            </div>
          </div>
        </div>
        <div class="sp-card__body sv-scroll">
          <ul class="sv-fileList" id="fileList"></ul>
        </div>
      </article>

      <article id="preview" class="sp-card sv-panel">
        <div class="sp-card__header">
          <div class="sv-previewHeader">
            <div class="sv-previewHeading">
              <h2 class="sp-h3">Preview</h2>
              <span class="sp-badge sp-badge--soft" id="statusMode">terminal</span>
            </div>
            <div class="sv-previewModes" aria-label="Preview modes">
              <button class="sp-btn sp-btn--sm" id="modeNormalBtn" type="button">Normal</button>
              <button class="sp-btn sp-btn--sm" id="modeTerminalBtn" type="button">Terminal</button>
            </div>
          </div>
        </div>
        <div class="sp-card__body sv-scroll sp-stack">
          <div id="previewMeta" class="sp-muted">Select a file or folder.</div>
          <div id="previewContent" class="sv-preview">No selection yet.</div>
        </div>
      </article>
    </section>
  </main>

  <footer class="sp-footer sv-footerWrap" aria-label="Site footer">
    <div>
      <section class="sp-card sp-card--surface">
        <div class="sp-card__body">
          <div class="demo-footer__row">
            <div>
              © <span id="footerYear"></span> Spectra Portal. All rights reserved.
              <span class="demo-footer__credit">
                · Built by <a class="demo-footer__link" href="https://codecruncherstechnologies.com">Code Crunchers Technologies</a>
              </span>
            </div>
            <nav class="demo-footer__links" aria-label="Legal">
              <a class="demo-footer__link" href="#">Privacy</a>
              <a class="demo-footer__link" href="#">Terms</a>
              <a class="demo-footer__link" href="#">Licenses</a>
            </nav>
          </div>
        </div>
      </section>
    </div>
  </footer>

  <script>
    const source = {
      label: "Gate Drafts",
      rootLabel: "drafts",
      publicBase: "/drafts/"
    };

    const treeData = {
      "": [
        { name: "boot", type: "dir" },
        { name: "chat_center", type: "dir" },
        { name: "deploy", type: "dir" },
        { name: "hollowverse", type: "dir" },
        { name: "old_chat_archive", type: "dir" },
        { name: "spectra-viewer", type: "dir" },
        { name: "test", type: "dir" },
        { name: "test-draft.md", type: "file", size: 76 }
      ],
      "boot/": [
        { name: "assets-endpoint-plan.md", type: "file", size: 3013 },
        { name: "BOOT.md", type: "file", size: 1049 },
        { name: "CURRENT.md", type: "file", size: 8068 },
        { name: "REDIRECT.md", type: "file", size: 4991 },
        { name: "WRAP.md", type: "file", size: 2002 }
      ],
      "chat_center/": [
        { name: "system", type: "dir" },
        { name: "_index.md", type: "file", size: 1478 },
        { name: "START_HERE.md", type: "file", size: 2765 }
      ],
      "chat_center/system/": [
        { name: "routing_policy.md", type: "file", size: 4071 },
        { name: "style.md", type: "file", size: 2215 },
        { name: "system_manifest.md", type: "file", size: 2771 }
      ],
      "deploy/": [
        { name: "nginx-drafts-route.conf", type: "file", size: 1712 },
        { name: "spectraportal.dev-with-drafts.conf", type: "file", size: 1013 }
      ],
      "hollowverse/": [
        { name: "forest_of_illusions", type: "dir" },
        { name: "_index.md", type: "file", size: 487 }
      ],
      "hollowverse/forest_of_illusions/": [
        { name: "animals", type: "dir" },
        { name: "places", type: "dir" },
        { name: "presence", type: "dir" },
        { name: "terrain", type: "dir" },
        { name: "weather", type: "dir" },
        { name: "_index.md", type: "file", size: 411 }
      ],
      "hollowverse/forest_of_illusions/animals/": [
        { name: "_index.md", type: "file", size: 606 }
      ],
      "hollowverse/forest_of_illusions/places/": [
        { name: "cottage", type: "dir" }
      ],
      "hollowverse/forest_of_illusions/places/cottage/": [
        { name: "bedroom_nook", type: "dir" },
        { name: "kitchenette", type: "dir" },
        { name: "study_nook", type: "dir" },
        { name: "_index.md", type: "file", size: 615 }
      ],
      "hollowverse/forest_of_illusions/places/cottage/bedroom_nook/": [
        { name: "_index.md", type: "file", size: 452 }
      ],
      "hollowverse/forest_of_illusions/places/cottage/kitchenette/": [
        { name: "_index.md", type: "file", size: 432 }
      ],
      "hollowverse/forest_of_illusions/places/cottage/study_nook/": [
        { name: "_index.md", type: "file", size: 427 }
      ],
      "hollowverse/forest_of_illusions/presence/": [
        { name: "_index.md", type: "file", size: 524 }
      ],
      "hollowverse/forest_of_illusions/terrain/": [
        { name: "_index.md", type: "file", size: 417 }
      ],
      "hollowverse/forest_of_illusions/weather/": [
        { name: "_index.md", type: "file", size: 550 }
      ],
      "old_chat_archive/": [
        { name: "2026-03-13__gate-hollowverse-wiring.md", type: "file", size: 3123 },
        { name: "2026-03-15__spectra-viewer-handoff.md", type: "file", size: 2938 },
        { name: "README.md", type: "file", size: 785 }
      ],
      "spectra-viewer/": [
        { name: "index.html", type: "file", size: 21649 },
        { name: "plan.md", type: "file", size: 1843 }
      ],
      "test/": [
        { name: "index.html", type: "file", size: 978 },
        { name: "test.md", type: "file", size: 56 }
      ]
    };

    const state = {
      path: "",
      selectedKey: null,
      filter: "",
      previewMode: "terminal",
      selectedEntry: null,
      drawerOpen: false
    };

    const fileList = document.getElementById("fileList");
    const previewMeta = document.getElementById("previewMeta");
    const previewContent = document.getElementById("previewContent");
    const searchInput = document.getElementById("searchInput");
    const browseTitlePath = document.getElementById("browseTitlePath");
    const statusMode = document.getElementById("statusMode");
    const modeNormalBtn = document.getElementById("modeNormalBtn");
    const modeTerminalBtn = document.getElementById("modeTerminalBtn");
    const navDrawerToggleBtn = document.getElementById("navDrawerToggleBtn");
    const drawerCloseBtn = document.getElementById("drawerCloseBtn");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const toolDrawer = document.getElementById("toolDrawer");
    const uploadBtn = document.getElementById("uploadBtn");

    function normalizePath(path){
      if (!path) return "";
      return path.endsWith("/") ? path : path + "/";
    }

    function getEntries(){
      return treeData[state.path] || [];
    }

    function getParentPath(path = state.path){
      const parts = String(path).split("/").filter(Boolean);
      if (!parts.length) return "";
      parts.pop();
      return parts.length ? parts.join("/") + "/" : "";
    }

    function getFilteredEntries(){
      const query = state.filter.trim().toLowerCase();
      const entries = getEntries();
      if (!query) return entries;
      return entries.filter((entry) => entry.name.toLowerCase().includes(query));
    }

    function getPublicUrl(entry){
      if (!entry) return source.publicBase + state.path;
      return source.publicBase + state.path + entry.name;
    }

    function getDisplayLocation(entry){
      return getPublicUrl(entry) || `viewer://drafts/${state.path}${entry ? entry.name : ""}`;
    }

    function getDisplayBrowsePath(){
      return state.path ? `drafts/${state.path}` : "drafts/";
    }

    function getEffectivePreviewMode(entry){
      if (!entry || entry.type === "dir") return "normal";
      if (entry.preview === "image") return "normal";
      return state.previewMode;
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatBytes(size){
      if (!Number.isFinite(size)) return "—";
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      return `${(size / (1024 * 1024)).toFixed(1)} MB`;
    }

    function truncateFileName(name, maxLength = 32){
      if (name.length <= maxLength) return name;
      const extMatch = name.match(/(\.[^.]+)$/);
      const ext = extMatch ? extMatch[1] : "";
      const stem = ext ? name.slice(0, -ext.length) : name;
      const stemLength = Math.max(8, maxLength - ext.length - 1);
      if (stem.length <= stemLength) return name;
      return `${stem.slice(0, stemLength)}…${ext}`;
    }

    function getBrowseFileNameHtml(name){
      const displayName = truncateFileName(name, 18);
      return `<strong class="sv-fileTitle" title="${escapeHtml(name)}">${escapeHtml(displayName)}</strong>`;
    }

    function isImageFile(name){
      return /\.(png|jpe?g|gif|webp|svg)$/i.test(name);
    }

    function isTextLikeFile(name){
      return /\.(md|txt|html?|css|js|mjs|json|xml|ya?ml|conf|ini|sh)$/i.test(name);
    }

    function setDrawerOpen(open){
      state.drawerOpen = open;
      toolDrawer.classList.toggle("is-open", open);
      drawerBackdrop.classList.toggle("is-open", open);
      toolDrawer.setAttribute("aria-hidden", String(!open));
      navDrawerToggleBtn.setAttribute("aria-expanded", String(open));
    }

    function updateActions(){}

    function scrollSelectedIntoView(){
      if (!state.selectedKey) return;
      const button = fileList.querySelector(`[data-key="${CSS.escape(state.selectedKey)}"]`);
      if (button) button.scrollIntoView({ block: "nearest" });
    }

    function renderFiles(){
      fileList.innerHTML = "";
      const entries = getFilteredEntries();

      if (state.path) {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.className = "sv-fileBtn";
        btn.type = "button";
        btn.innerHTML = `
          <div class="sv-fileRow">
            <div>
              <strong>..</strong>
              <div class="sp-muted">parent directory</div>
            </div>
            <div class="sv-fileMeta">up</div>
          </div>`;
        btn.addEventListener("click", async () => {
          state.path = getParentPath();
          state.filter = "";
          searchInput.value = "";
          state.selectedKey = null;
          state.selectedEntry = null;
          render();
          await autoPreviewPreferredEntry();
        });
        li.appendChild(btn);
        fileList.appendChild(li);
      }

      if (!entries.length){
        if (!state.path) {
          const li = document.createElement("li");
          li.innerHTML = `<div class="sp-muted">No files match this view.</div>`;
          fileList.appendChild(li);
        }
        return;
      }

      entries.forEach((entry) => {
        const li = document.createElement("li");
        const item = document.createElement("div");
        item.className = "sv-fileItem";

        const btn = document.createElement("button");
        btn.className = "sv-fileBtn";
        btn.type = "button";
        const key = `${state.path}:${entry.name}`;
        btn.dataset.key = key;
        btn.setAttribute("aria-current", String(key === state.selectedKey));
        btn.innerHTML = `
          <div class="sv-fileRow">
            <div class="sv-fileName">
              ${getBrowseFileNameHtml(entry.name)}
              <span class="sv-fileKind">· ${entry.type}</span>
            </div>
            ${entry.type === "dir" ? '<div class="sv-fileMeta">—</div>' : ""}
          </div>`;

        btn.addEventListener("click", async () => {
          state.selectedKey = key;
          state.selectedEntry = entry;
          if (entry.type === "dir") {
            state.path = normalizePath(state.path + entry.name);
            state.filter = "";
            searchInput.value = "";
            state.selectedKey = null;
            state.selectedEntry = null;
            render();
            await autoPreviewPreferredEntry();
            return;
          }
          await preview(entry);
          render();
          scrollSelectedIntoView();
        });

        item.appendChild(btn);

        if (entry.type === "file") {
          const downloadLink = document.createElement("a");
          downloadLink.className = "sv-fileAction";
          downloadLink.href = getDisplayLocation(entry);
          downloadLink.download = entry.name;
          downloadLink.textContent = "↓";
          downloadLink.title = `Download ${entry.name}`;
          downloadLink.setAttribute("aria-label", `Download ${entry.name}`);
          item.appendChild(downloadLink);

          const openLink = document.createElement("a");
          openLink.className = "sv-fileAction";
          openLink.href = getDisplayLocation(entry);
          openLink.target = "_blank";
          openLink.rel = "noreferrer";
          openLink.textContent = "↗";
          openLink.title = `Open ${entry.name}`;
          openLink.setAttribute("aria-label", `Open ${entry.name}`);
          item.appendChild(openLink);
        }

        li.appendChild(item);
        fileList.appendChild(li);
      });
    }

    function renderPreviewModeControls(entry){
      const effectiveMode = getEffectivePreviewMode(entry);
      modeNormalBtn.className = effectiveMode === "normal" ? "sp-btn sp-btn--sm sp-btn--primary" : "sp-btn sp-btn--sm";
      modeTerminalBtn.className = effectiveMode === "terminal" ? "sp-btn sp-btn--sm sp-btn--primary" : "sp-btn sp-btn--sm";
      const terminalAllowed = Boolean(entry && entry.type !== "dir" && !isImageFile(entry.name));
      modeTerminalBtn.disabled = !terminalAllowed;
      statusMode.textContent = effectiveMode;
    }

    async function loadFile(entry){
      const response = await fetch(getDisplayLocation(entry), { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      if (isImageFile(entry.name)) {
        return { kind: "image", url: getDisplayLocation(entry) };
      }
      const text = await response.text();
      return { kind: isTextLikeFile(entry.name) ? "text" : "text", text };
    }

    async function preview(entry){
      state.selectedEntry = entry;
      const effectiveMode = getEffectivePreviewMode(entry);
      renderPreviewModeControls(entry);
      updateActions();

      if (entry.type === "dir") {
        previewMeta.innerHTML = `Directory · <a class="sv-metaLink" href="${getDisplayLocation()}" target="_blank" rel="noreferrer">${getDisplayLocation()}</a>`;
        previewContent.className = "sv-preview";
        previewContent.textContent = "Directory selected. Open to browse contents.";
        return;
      }

      previewMeta.textContent = `File · ${entry.name} · ${formatBytes(entry.size)}`;
      previewContent.className = "sv-preview";
      previewContent.textContent = "Loading preview…";

      try {
        const loaded = await loadFile(entry);

        if (loaded.kind === "image") {
          previewContent.className = "sv-preview";
          previewContent.innerHTML = `<img class="sv-imagePreview" src="${loaded.url}" alt="${entry.name}">`;
          return;
        }

        const text = loaded.text || "";

        if (effectiveMode === "terminal") {
          previewContent.className = "sv-preview sv-preview--terminal";
          previewContent.innerHTML = `
            <div class="sv-terminal">
              <div class="sv-terminal__bar">
                <div class="sv-terminal__dots" aria-hidden="true">
                  <span class="sv-terminal__dot"></span>
                  <span class="sv-terminal__dot"></span>
                  <span class="sv-terminal__dot"></span>
                </div>
                <span>${escapeHtml(getDisplayLocation(entry))}</span>
              </div>
              <pre class="sv-terminal__body"><span class="sv-terminal__prompt">$ cat ${escapeHtml(entry.name)}</span>

${escapeHtml(text || "No preview available.")}</pre>
            </div>`;
          return;
        }

        previewContent.className = "sv-preview";
        previewContent.textContent = text || "No preview available.";
      } catch (error) {
        previewContent.className = "sv-preview";
        previewContent.textContent = `Preview failed: ${error.message}`;
      }
    }

    async function autoPreviewPreferredEntry(){
      const entries = getFilteredEntries();
      const preferred = entries.find((entry) => entry.type === "file" && !isImageFile(entry.name)) || entries.find((entry) => entry.type === "file") || entries.find((entry) => entry.type === "dir");
      if (!preferred) {
        state.selectedEntry = null;
        previewMeta.innerHTML = `Select a file or folder. Current path: <a class="sv-metaLink" href="${getDisplayLocation()}" target="_blank" rel="noreferrer">${getDisplayLocation()}</a>`;
        previewContent.className = "sv-preview";
        previewContent.textContent = state.filter ? `No matches for “${state.filter}”.` : "No selection yet.";
        renderPreviewModeControls(null);
        updateActions();
        return;
      }
      state.selectedKey = `${state.path}:${preferred.name}`;
      if (preferred.type === "dir") {
        state.selectedEntry = preferred;
        previewMeta.innerHTML = `Directory · <a class="sv-metaLink" href="${getDisplayLocation(preferred)}" target="_blank" rel="noreferrer">${getDisplayLocation(preferred)}</a>`;
        previewContent.className = "sv-preview";
        previewContent.textContent = "Directory selected. Open to browse contents.";
        renderPreviewModeControls(preferred);
        updateActions();
      } else {
        await preview(preferred);
      }
      render();
      scrollSelectedIntoView();
    }

    async function performSearch(){
      state.filter = searchInput.value.trim();
      render();
      await autoPreviewPreferredEntry();
    }

    function render(){
      browseTitlePath.textContent = getDisplayBrowsePath();
      renderFiles();
      renderPreviewModeControls(state.selectedEntry);
      updateActions();
    }

    searchInput.addEventListener("keydown", async (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        await performSearch();
      }
    });

    document.getElementById("searchBtn").addEventListener("click", async () => {
      await performSearch();
    });

    navDrawerToggleBtn.addEventListener("click", () => {
      setDrawerOpen(!state.drawerOpen);
    });

    drawerCloseBtn.addEventListener("click", () => {
      setDrawerOpen(false);
    });

    drawerBackdrop.addEventListener("click", () => {
      setDrawerOpen(false);
    });

    modeNormalBtn.addEventListener("click", async () => {
      state.previewMode = "normal";
      if (state.selectedEntry) {
        await preview(state.selectedEntry);
      } else {
        renderPreviewModeControls(null);
      }
    });

    modeTerminalBtn.addEventListener("click", async () => {
      state.previewMode = "terminal";
      if (state.selectedEntry) {
        await preview(state.selectedEntry);
      } else {
        renderPreviewModeControls(null);
      }
    });

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      state.filter = "";
      searchInput.value = "";
      render();
      await autoPreviewPreferredEntry();
    });

    uploadBtn.addEventListener("click", () => {
      window.alert("Upload is not wired yet.");
    });

    document.getElementById("footerYear").textContent = new Date().getFullYear();

    render();
    autoPreviewPreferredEntry();
  </script>
</body>
</html>
