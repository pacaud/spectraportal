<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Spectra Token: Radius">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="18" y="18" width="220" height="220" rx="28"
        fill="color-mix(in srgb, var(--sp-surface, #111827) 70%, transparent 30%)"
        stroke="var(--sp-border, #223044)"/>

  
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="70" y="74" width="116" height="116" rx="10" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 16%, transparent 84%)" stroke-width="8"/>
    <rect x="82" y="86" width="92" height="92" rx="22" stroke="var(--sp-accent, #2EA043)" stroke-opacity=".55" stroke-width="8"/>
    <rect x="94" y="98" width="68" height="68" rx="34" stroke="var(--sp-accent-2, #60A5FA)" stroke-opacity=".55" stroke-width="8"/>
  </g>

</svg>
