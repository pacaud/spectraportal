<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Spectra Token: Space">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="18" y="18" width="220" height="220" rx="28"
        fill="color-mix(in srgb, var(--sp-surface, #111827) 70%, transparent 30%)"
        stroke="var(--sp-border, #223044)"/>

  
  <g filter="url(#glow)" fill="none" stroke-linecap="round">
    <path d="M72 92h112" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 16%, transparent 84%)" stroke-width="10"/>
    <path d="M72 128h80"  stroke="var(--sp-accent, #2EA043)" stroke-opacity=".55" stroke-width="10"/>
    <path d="M72 164h56"  stroke="var(--sp-accent-2, #60A5FA)" stroke-opacity=".55" stroke-width="10"/>

    <path d="M184 92v72" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 12%, transparent 88%)" stroke-width="10"/>
    <path d="M160 128v36" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 10%, transparent 90%)" stroke-width="10"/>
  </g>

  <circle cx="184" cy="174" r="10" fill="var(--sp-accent-2, #60A5FA)" opacity=".55"/>

</svg>
