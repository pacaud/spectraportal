<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Spectra Token: Color">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="18" y="18" width="220" height="220" rx="28"
        fill="color-mix(in srgb, var(--sp-surface, #111827) 70%, transparent 30%)"
        stroke="var(--sp-border, #223044)"/>

  
  <g filter="url(#glow)">
    <circle cx="92" cy="112" r="34" fill="var(--sp-accent, #2EA043)" opacity=".55"/>
    <circle cx="142" cy="92" r="26" fill="var(--sp-accent-2, #60A5FA)" opacity=".55"/>
    <circle cx="156" cy="136" r="30" fill="var(--sp-accent-3, #A78BFA)" opacity=".45"/>
  </g>

  <path d="M64 176h128" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 22%, transparent 78%)" stroke-width="8" stroke-linecap="round"/>
  <path d="M64 200h84" stroke="color-mix(in srgb, var(--sp-text, #E6EDF7) 14%, transparent 86%)" stroke-width="8" stroke-linecap="round"/>

</svg>
