<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spectra Token: Buttons">
  <defs>
    <style>
      .bg   { fill: #070C18; }
      .out  { stroke: #1F2A44; }
      .in   { stroke: #F1F5FF; opacity: .90; }
      .soft { fill: #0B1224; opacity: .55; }
    </style>
  </defs>

  <!-- Outer frame -->
  <rect x="6" y="6" width="52" height="52" rx="12"
        class="bg out" stroke-width="2"/>

  <!-- Inner frame -->
  <rect x="11" y="11" width="42" height="42" rx="7"
        fill="none" class="in" stroke-width="1.75"/>

  <!-- Soft plate -->
  <rect x="15" y="15" width="34" height="34" rx="6" class="soft"/>

  <!-- Buttons glyph (solid / active) -->
  <rect x="20" y="26" width="24" height="12" rx="6"
        fill="#4F8CFF" opacity=".95"/>
  <rect x="27" y="31" width="10" height="2.5" rx="1.25"
        fill="#F1F5FF" opacity=".85"/>

  <!-- Corner dot -->
  <circle cx="55" cy="9" r="4" fill="#16A34A"/>
</svg>
