<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spectra token">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerShadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="1.2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.25" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <linearGradient id="spectraBand" x1="10" y1="54" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#16A34A" stop-opacity="0.28"/>
    </linearGradient>

    <clipPath id="innerClip">
      <rect x="8" y="8" width="48" height="48" rx="10"/>
    </clipPath>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="12"
        fill="#070C18" stroke="#1F2A44" stroke-width="2"/>

  <circle cx="55" cy="9" r="4" fill="#16A34A"/>

  <path d="M32 18
           c-8.5 0-15 5.5-15 13
           0 6.5 4.5 11 11 11
           3 0 5-2.2 5-4.5
           0-1.6 1.5-2.3 3-2.3
           6.5 0 10-3.2 10-8
           0-4.5-6.5-9.2-14-9.2z"
        fill="#070C18"
        stroke="#F1F5FF"
        stroke-width="2.2"
        stroke-linejoin="round"
        filter="url(#innerShadow)"/>

  <circle cx="24.5" cy="26.5" r="2.3" fill="#7C3AED"/>
  <circle cx="30"   cy="23"   r="2.3" fill="#2563EB"/>
  <circle cx="35.5" cy="27"   r="2.3" fill="#16A34A"/>

  <path d="M8 20 C22 6 38 8 46 16"
        fill="none"
        stroke="#8B5CF6"
        stroke-width="2.4"
        stroke-linecap="round"
        opacity="0.8"
        filter="url(#glow)"/>

  <g clip-path="url(#innerClip)">
    <path d="M8 50
             c8-6 14-6 22 0
             s14 6 22 0
             V56
             H8 Z"
          fill="url(#spectraBand)"/>
  </g>

  <circle cx="48" cy="18" r="1.6" fill="#CBD5F5" opacity="0.6"/>
</svg>
