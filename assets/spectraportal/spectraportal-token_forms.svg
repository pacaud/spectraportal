<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spectra Token: Forms">
  <defs>
    <style>
      .bg   { fill: #070C18; }
      .out  { stroke: #1F2A44; }
      .in   { stroke: #F1F5FF; opacity: .90; }
      .soft { fill: #0B1224; opacity: .55; }
    </style>
  </defs>

  <!-- Outer frame -->
  <rect x="6" y="6" width="52" height="52" rx="12"
        class="bg out" stroke-width="2"/>

  <!-- Inner frame -->
  <rect x="11" y="11" width="42" height="42" rx="7"
        fill="none" class="in" stroke-width="1.75"/>

  <!-- Soft plate -->
  <rect x="15" y="15" width="34" height="34" rx="6" class="soft"/>

  <!-- Forms glyph (structural / neutral) -->
  <!-- input field -->
  <rect x="18" y="18.5" width="28" height="9" rx="4.5"
        fill="none" stroke="#B8C2CF" stroke-width="2.2" opacity=".55"/>
  <!-- input text line -->
  <path d="M23 23h13"
        fill="none" stroke="#9AA7B6" stroke-width="2.2"
        stroke-linecap="round" opacity=".45"/>

  <!-- checkbox (neutral) -->
  <rect x="20" y="32" width="9" height="9" rx="2"
        fill="none" stroke="#9AA7B6" stroke-width="2.2" opacity=".45"/>

  <!-- radio (outline only) -->
  <circle cx="41.5" cy="36.5" r="5.2"
          fill="none" stroke="#9AA7B6" stroke-width="2.2" opacity=".45"/>

  <!-- Corner dot -->
  <circle cx="55" cy="9" r="4" fill="#16A34A"/>
</svg>
