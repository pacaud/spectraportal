<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spectra — Colors</title>

  <script>
  (() => {
    const key = "spectra_theme";
    const t = localStorage.getItem(key) || "dark";
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>

  <link rel="icon" type="image/svg+xml" href="/assets/brand/spectraportal-favicon.svg">
<link rel="icon" href="/framework/favicon.ico" sizes="any">

  <link rel="stylesheet" href="/framework/cdn/v0.1/spectra.min.css" />
<link rel="stylesheet" href="/framework/cdn/v0.1/theme.min.css" />
<link rel="stylesheet" href="/framework/cdn/v0.1/overrides.min.css" />

  <style>



    /* v0.0.25 alignment: single card, no nested cards */
    .demo-token-card{ margin-top: var(--sp-6); }
    .demo-inner-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: var(--sp-6);
      align-items:start;
    }
    @media (min-width: 980px){
      .demo-inner-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    /* keep long values readable */
    .sp-token-table td, .sp-token-table th{ vertical-align: top; }
    .sp-token-table .js-val, .sp-token-table .js-hex, .sp-token-table .js-colorname{
      word-break: break-word;
      overflow-wrap: anywhere;
    }



  </style>
</head>
<body class="demo-page">

<main class="sp-container sp-content demo-main">
<section class="sp-stack" style="gap: var(--sp-4);">
    <div class="sp-stack" style="gap: var(--sp-2);">
      <h1 class="sp-h2" style="margin:0;">Color tokens</h1>
      <p class="sp-muted" style="margin:0;">
        Reference for <code class="sp-code">--sp-*</code> color + shadow tokens.
      </p>
    </div>
  </section>

  <section class="sp-card demo-token-card">
    <header class="sp-card__header">
      <h2 class="sp-h3" style="margin:0;">Colors</h2>
      <p class="sp-muted" style="margin:0;">Computed values are read from <code class="sp-code">:root</code>.</p>
    </header>

    <div class="sp-card__body sp-stack" style="gap: var(--sp-8);">
      

      <div class="demo-inner-grid">
        <section class="sp-stack" style="gap: var(--sp-4);">
          <h2 class="sp-h3" style="margin:0;">Text shadows</h2>
          
        </section>

        <section class="sp-stack" style="gap: var(--sp-4);">
          <h2 class="sp-h3" style="margin:0;">Shadows</h2>
          
        </section>
      </div>

      <section class="sp-stack" style="gap: var(--sp-3);">
        <h2 class="sp-h3" style="margin:0;">Link token</h2>
        
      </section>
    </div>
  </section>

  <script>
  function getVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function normalizeHex(hex){
    if(!hex || hex[0] !== "#") return null;
    const h = hex.trim();
    if(/^#([0-9a-f]{3})$/i.test(h)){
      const r=h[1], g=h[2], b=h[3];
      return ("#"+r+r+g+g+b+b).toLowerCase();
    }
    if(/^#([0-9a-f]{4})$/i.test(h)){
      const r=h[1], g=h[2], b=h[3], a=h[4];
      return ("#"+r+r+g+g+b+b+a+a).toLowerCase();
    }
    if(/^#([0-9a-f]{6})$/i.test(h)) return h.toLowerCase();
    if(/^#([0-9a-f]{8})$/i.test(h)) return h.toLowerCase();
    return null;
  }

  function rgbToHex(rgb){
    const m = rgb.match(/^rgba?\(([^)]+)\)$/i);
    if(!m) return null;
    const parts = m[1].split(",").map(s => s.trim());
    if(parts.length < 3) return null;

    const r = Math.max(0, Math.min(255, parseFloat(parts[0])));
    const g = Math.max(0, Math.min(255, parseFloat(parts[1])));
    const b = Math.max(0, Math.min(255, parseFloat(parts[2])));
    const a = parts.length >= 4 ? Math.max(0, Math.min(1, parseFloat(parts[3]))) : 1;

    const to2 = (n) => Math.round(n).toString(16).padStart(2, "0");
    const base = ("#" + to2(r) + to2(g) + to2(b)).toLowerCase();
    if(a >= 0.999) return base;
    return (base + to2(a * 255)).toLowerCase();
  }

  function toHex(value){
    return normalizeHex(value) || rgbToHex(value);
  }

  function hexToRgb(hex){
    const h = normalizeHex(hex);
    if(!h) return null;
    const hh = h.length === 9 ? h.slice(0,7) : h;
    return {
      r: parseInt(hh.slice(1,3), 16),
      g: parseInt(hh.slice(3,5), 16),
      b: parseInt(hh.slice(5,7), 16)
    };
  }

  function dist(a,b){
    const dr=a.r-b.r, dg=a.g-b.g, db=a.b-b.b;
    return dr*dr + dg*dg + db*db;
  }

  const NAMED = [
    ["Black","#000000"], ["White","#ffffff"],
    ["DimGray","#696969"], ["Gray","#808080"], ["SlateGray","#708090"],
    ["Gainsboro","#dcdcdc"],
    ["MidnightBlue","#191970"], ["Navy","#000080"], ["SteelBlue","#4682b4"],
    ["DodgerBlue","#1e90ff"], ["SkyBlue","#87ceeb"],
    ["Teal","#008080"], ["Cyan","#00ffff"],
    ["SeaGreen","#2e8b57"], ["ForestGreen","#228b22"], ["LimeGreen","#32cd32"],
    ["Gold","#ffd700"], ["Orange","#ffa500"], ["Tomato","#ff6347"],
    ["Crimson","#dc143c"], ["Red","#ff0000"],
    ["HotPink","#ff69b4"], ["Violet","#ee82ee"], ["Purple","#800080"],
    ["Indigo","#4b0082"]
  ];

  function nearestName(hex){
    const rgb = hexToRgb(hex);
    if(!rgb) return "—";
    let best = null;
    for(const [name, h] of NAMED){
      const rr = hexToRgb(h);
      const d = dist(rgb, rr);
      if(best === null || d < best.d) best = {name, d};
    }
    return best ? best.name : "—";
  }

  function hydrateColorRows(){
    for (const row of document.querySelectorAll("tr[data-token]")){
      const token = row.getAttribute("data-token");
      const semName = row.getAttribute("data-name") || token;

      const val = getVar(token);
      const hex = toHex(val);

      const nameCell = row.querySelector(".js-name");
      if(nameCell) nameCell.textContent = semName;

      const hexCell = row.querySelector(".js-hex");
      if(hexCell) hexCell.innerHTML = "<code class='sp-code'>" + (hex || "—") + "</code>";

      const colorNameCell = row.querySelector(".js-colorname");
      if(colorNameCell) colorNameCell.innerHTML = "<code class='sp-code'>" + (hex ? nearestName(hex) : "—") + "</code>";
    }
  }

  function hydrateShadowRows(){
    for (const row of document.querySelectorAll("tr[data-shadow]")){
      const token = row.getAttribute("data-shadow");
      const name = row.getAttribute("data-name") || token;
      const val = getVar(token);

      const nameCell = row.querySelector(".js-name");
      if(nameCell) nameCell.textContent = name;

      const valCell = row.querySelector(".js-val");
      if(valCell) valCell.innerHTML = "<code class='sp-code'>" + (val || "—") + "</code>";
    }
  }

  function hydrateTextShadowRows(){
    for (const row of document.querySelectorAll("tr[data-textshadow]")){
      const token = row.getAttribute("data-textshadow");
      const name = row.getAttribute("data-name") || token;
      const val = getVar(token);

      const nameCell = row.querySelector(".js-name");
      if(nameCell) nameCell.textContent = name;

      const valCell = row.querySelector(".js-val");
      if(valCell) valCell.innerHTML = "<code class='sp-code'>" + (val || "—") + "</code>";
    }
  }

  function hydrateLinkToken(){
    const linkVal = getVar("--sp-link");
    const linkHex = toHex(linkVal);
    const linkName = linkHex ? nearestName(linkHex) : "—";
    const el = document.getElementById("link-meta");
    if(el){
      el.innerHTML = "<code class='sp-code'>" + (linkHex || "—") + "</code> &nbsp; <code class='sp-code'>" + linkName + "</code>";
    }
  }

  hydrateColorRows();
  hydrateShadowRows();
  hydrateTextShadowRows();
  hydrateLinkToken();
</script>
</main>


</body>
</html>
