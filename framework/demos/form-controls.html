<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Spectra Demo — Form Controls</title>
<!-- match index.html theme boot -->
<script>
  (() => {
    const key = "spectra_theme";
    const t = localStorage.getItem(key) || "dark";
    document.documentElement.setAttribute("data-theme", t);
  })();
  </script>
<!-- match index.html favicons -->
<link href="/assets/brand/spectraportal-favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="/framework/favicon.ico" rel="icon" sizes="any"/>
<!-- match index.html local framework paths -->
<link href="/framework/cdn/v0.1/spectra.min.css" rel="stylesheet"/>
<link href="/framework/cdn/v0.1/theme.min.css" rel="stylesheet"/>
<link href="/framework/cdn/v0.1/overrides.min.css" rel="stylesheet">

</link><style>
    /* page scaffold so footer sits at bottom on short pages */
    body.demo-page{
      display:flex;
      flex-direction:column;
      min-height: var(--sp-page-min-h);
    }
    .demo-main{
      flex:1;
      margin-top: var(--sp-8);
    }

    /* demo portal header: keep primary nav truly centered */
    .sp-header__inner{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap: var(--sp-6);
    }
    .sp-header__left{ justify-self:start; }
    .sp-header__center{ justify-self:center; }
    .demo-header__right{ justify-self:end; }

    /* footer spacing + structure */
    .demo-footer{
      margin-top: var(--sp-10);
      padding: var(--sp-8) 0 var(--sp-10);
    }
    .demo-footer__row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: var(--sp-4);
      flex-wrap:wrap;
      color: var(--sp-text-muted);
      font-size: var(--sp-fs-0);
    }
    .demo-footer__links{
      display:flex;
      gap: var(--sp-4);
      align-items:center;
      flex-wrap:wrap;
    }
    .demo-footer__link{
      color: var(--sp-text-muted);
      text-decoration:none;
    }
    .demo-footer__link:hover{
      color: var(--sp-text);
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,.25);
    }
    .demo-footer__credit{
      margin-left: var(--sp-2);
      color: var(--sp-text-muted);
      white-space:nowrap;
    }

    /* demo pages: a touch wider for component comparison */
    .demo-page .sp-container{ max-width: 1100px; }

    /* forms grid (mirrors cards demo) */
    .demo-form-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: var(--sp-6);
      align-items:start;
      justify-items:stretch;
    }
    .demo-form-grid > .sp-card{
      width:100%;
      max-width:none;
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .demo-form-grid .sp-card__body{ flex:1; }
    .demo-span-all{ grid-column: 1 / -1; }
    @media (min-width: 900px){
      .demo-form-grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (min-width: 1200px){
      .demo-form-grid{ grid-template-columns: repeat(3, minmax(0,1fr)); }
    }

    /* compact card helper (optional) */
    .sp-card--compact .sp-card__header,
    .sp-card--compact .sp-card__body,
    .sp-card--compact .sp-card__footer{
      padding: var(--sp-3) var(--sp-4);
    }
    .sp-card--compact .sp-card__header{ padding-bottom: var(--sp-2); }
    .sp-card--compact .sp-card__footer{ padding-top: var(--sp-2); }
</style></head><body class="demo-page"><header class="sp-header">
<div class="sp-header__inner sp-container">
<div class="sp-header__left">
<a class="sp-brand" href="./index.html">
<img alt="" aria-hidden="true" class="sp-brand__mark" src="/assets/brand/spectraportal-wave.svg"/>
<span class="sp-brand__text">Spectra</span>
<span class="sp-badge sp-badge--soft">v0.1</span>
</a>
</div>
<nav aria-label="Primary" class="sp-header__center sp-nav">
<a class="sp-nav__link" href="./index.html">Docs</a>
<a class="sp-nav__link" href="./index.html">Demos</a>
<a class="is-active sp-nav__link" href="./form-controls.html">Components</a>
</nav>
</div>
</header><main class="sp-container sp-content demo-main">
<section class="sp-stack" style="gap: var(--sp-4);">
<div class="sp-stack" style="gap: var(--sp-2);">
<h1 class="sp-h2 demo-page-title">Form controls</h1>
<p class="sp-muted demo-page-subtitle">Inputs, selects, and textareas aligned to Spectra tokens.</p>
</div>
</section>
<section class="sp-stack" style="gap: var(--sp-6); margin-top: var(--sp-6);">
<div style="height:1px;background:var(--sp-border);opacity:.55;margin:var(--sp-6) 0 var(--sp-3);"></div>
<p class="sp-muted" style="margin:0;">
    Back to <a class="sp-link" href="./index.html">Demos</a>
<span aria-hidden="true">•</span>
    Components: <a class="sp-link" href="./buttons.html">Buttons</a>, <a class="sp-link" href="./cards.html">Cards</a>, <a class="sp-link" href="./color.html">Tokens</a>
</p>
</section></main><footer aria-label="Site footer" class="demo-footer">
<div class="sp-container">
<section aria-label="Footer legal" class="sp-card sp-card--surface">
<div class="sp-card__body">
<div class="demo-footer__row">
<div>
            © <span id="y"></span> SpectraPortal. All rights reserved.
            <span class="demo-footer__credit">
              · Built by
              <a class="demo-footer__link" href="https://codecruncherstechnologies.com">
                Code Crunchers Technologies
              </a>
</span>
</div>
<nav aria-label="Legal" class="demo-footer__links">
<a class="demo-footer__link" href="#">Privacy</a>
<a class="demo-footer__link" href="#">Terms</a>
<a class="demo-footer__link" href="#">Licenses</a>
</nav>
</div>
</div>
</section>
</div>
</footer></body></html>
